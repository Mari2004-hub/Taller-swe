<div class="container mt-4">

  <h2>TV Series</h2>

  <div class="row">

    <div class="col-8">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Channel</th>
            <th>Seasons</th>
          </tr>
        </thead>
        <tbody>
          @for (serie of series; track serie.id) {
            <tr>
              <td>{{ serie.id }}</td>

              <td>
                <button 
                  class="btn btn-link p-0 text-primary"
                  (click)="selectSerie(serie)">
                  {{ serie.name }}
                </button>
              </td>

              <td>{{ serie.channel }}</td>
              <td>{{ serie.seasons }}</td>
            </tr>
          }
        </tbody>
      </table>

      <p><strong>Average Seasons:</strong> {{ averageSeasons }}</p>
    </div>

    <div class="col-4" *ngIf="selectedSerie">
      <div class="card shadow-sm">
        <img [src]="selectedSerie.poster" class="card-img-top" />
        <div class="card-body">
          <h5 class="card-title">{{ selectedSerie.name }}</h5>
          <p class="card-text">{{ selectedSerie.description }}</p>
          <a [href]="selectedSerie.webpage" target="_blank">
            {{ selectedSerie.webpage }}
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
